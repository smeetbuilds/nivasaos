services:
  nivasaos:
    build: .
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    environment:
      NODE_ENV: production
      NIVASA_DB_PATH: /app/data/nivasaos.sqlite
      NIVASA_UPLOAD_DIR: /app/storage/uploads
      NIVASA_BACKUP_DIR: /app/backups
      NIVASA_PUBLIC_URL: "http://localhost:${NIVASA_PORT:-3000}"
      NEXT_PUBLIC_APP_URL: "http://localhost:${NIVASA_PORT:-3000}"
      NIVASA_ALLOW_INSECURE_LOCALHOST: "1"
      NIVASA_INSTALL_TOKEN: ${NIVASA_INSTALL_TOKEN:-local-compose-install-token-32-characters}
    ports:
      - "${NIVASA_PORT:-3000}:3000"
    volumes:
      - nivasa_data:/app/data
      - nivasa_uploads:/app/storage/uploads
      - nivasa_backups:/app/backups
    healthcheck:
      test: ["CMD", "bun", "-e", "const r=await fetch('http://127.0.0.1:3000/api/health'); if(!r.ok) process.exit(1)"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  nivasa_data:
  nivasa_uploads:
  nivasa_backups:
