version: 2.1

jobs:
  release-gate:
    docker:
      - image: oven/bun:1.3.0
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Install pinned dependencies
          command: bun install --frozen-lockfile
      - run:
          name: Run repository release gate
          command: bun run gate

workflows:
  verify:
    jobs:
      - release-gate
