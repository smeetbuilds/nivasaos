version: 2.1

orbs:
  browser-tools: circleci/browser-tools@2.4.2

jobs:
  release-gate:
    docker:
      - image: oven/bun:1.3.0
    resource_class: medium
    steps:
      - checkout
      - restore_cache:
          keys:
            - nivasaos-bun-v1-{{ checksum "bun.lock" }}
      - run:
          name: Install pinned dependencies
          command: bun install --frozen-lockfile
      - save_cache:
          key: nivasaos-bun-v1-{{ checksum "bun.lock" }}
          paths:
            - node_modules
            - /root/.bun/install/cache
      - run:
          name: Audit production dependencies
          command: bun run audit:dependencies
      - run:
          name: Run complete repository release gate
          command: bun run gate

  browser-gate:
    docker:
      - image: cimg/node:22.23.1-browsers
    resource_class: medium
    steps:
      - checkout
      - browser-tools/install-chrome:
          chrome-version: 150.0.7871.129
          replace-existing: true
      - run:
          name: Install pinned Bun runtime
          command: |
            curl -fsSL https://bun.com/install | bash -s "bun-v1.3.0"
            echo 'export BUN_INSTALL="$HOME/.bun"' >> "$BASH_ENV"
            echo 'export PATH="$BUN_INSTALL/bin:$PATH"' >> "$BASH_ENV"
      - run:
          name: Verify browser and Bun versions
          command: |
            source "$BASH_ENV"
            test "$(bun --version)" = "1.3.0"
            google-chrome --version
      - restore_cache:
          keys:
            - nivasaos-browser-bun-v1-{{ checksum "bun.lock" }}
      - run:
          name: Install pinned dependencies
          command: |
            source "$BASH_ENV"
            bun install --frozen-lockfile
      - save_cache:
          key: nivasaos-browser-bun-v1-{{ checksum "bun.lock" }}
          paths:
            - node_modules
            - /home/circleci/.bun/install/cache
      - run:
          name: Build production application
          command: |
            source "$BASH_ENV"
            bun run build
      - run:
          name: Run authenticated Chrome accessibility gate
          command: |
            source "$BASH_ENV"
            NIVASA_BROWSER_BIN="$(command -v google-chrome)" bun run gate:browser
      - store_artifacts:
          path: artifacts/browser
          destination: browser-gate

  cross-browser-gate:
    docker:
      - image: mcr.microsoft.com/playwright:v1.61.1-noble
    resource_class: large
    steps:
      - checkout
      - run:
          name: Install pinned Bun runtime
          command: |
            curl -fsSL https://bun.com/install | bash -s "bun-v1.3.0"
            echo 'export BUN_INSTALL="$HOME/.bun"' >> "$BASH_ENV"
            echo 'export PATH="$BUN_INSTALL/bin:$PATH"' >> "$BASH_ENV"
      - run:
          name: Install application and pinned browser driver
          command: |
            source "$BASH_ENV"
            bun install --frozen-lockfile
            npm install --no-save --package-lock=false playwright@1.61.1
      - run:
          name: Build production application
          command: |
            source "$BASH_ENV"
            bun run build
      - run:
          name: Run Firefox and WebKit certification
          command: |
            source "$BASH_ENV"
            bun run gate:cross-browser
      - store_artifacts:
          path: artifacts/cross-browser
          destination: cross-browser-gate

  render-build-gate:
    machine:
      image: ubuntu-2404:2026.05.1
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Verify Docker builder
          command: |
            docker version
            docker buildx version
      - run:
          name: Capture Render-equivalent Docker build
          command: |
            mkdir -p artifacts/render
            image_tag="nivasaos:render-${CIRCLE_SHA1}"
            set +e
            DOCKER_BUILDKIT=1 docker build --pull --progress=plain \
              --build-arg RENDER_EXTERNAL_HOSTNAME=nivasaos-ci.onrender.com \
              --build-arg RENDER_EXTERNAL_URL=https://nivasaos-ci.onrender.com \
              --build-arg RENDER_GIT_COMMIT="${CIRCLE_SHA1}" \
              --build-arg RENDER_GIT_BRANCH="${CIRCLE_BRANCH:-detached}" \
              --tag "${image_tag}" \
              . 2>&1 | tee artifacts/render/build.log
            build_status=${PIPESTATUS[0]}
            set -e
            printf '%s\n' "${build_status}" > artifacts/render/build-exit-code.txt
            if [ "${build_status}" -eq 0 ]; then
              docker image inspect "${image_tag}" > artifacts/render/image-inspect.json
              docker image ls "${image_tag}" --format '{{json .}}' > artifacts/render/image-size.jsonl
            fi
      - store_artifacts:
          path: artifacts/render
          destination: render-build
      - run:
          name: Enforce Render build result
          command: |
            build_status="$(cat artifacts/render/build-exit-code.txt)"
            if [ "${build_status}" -ne 0 ]; then
              echo "Render-equivalent Docker build failed with exit code ${build_status}. Open the render-build/build.log artifact and locate the first failing Docker layer."
              exit "${build_status}"
            fi

  container-gate:
    machine:
      image: ubuntu-2404:2026.05.1
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Install pinned Bun runtime
          command: |
            command -v unzip >/dev/null || (sudo apt-get update && sudo apt-get install -y unzip)
            curl -fsSL https://bun.com/install | bash -s "bun-v1.3.0"
            echo 'export BUN_INSTALL="$HOME/.bun"' >> "$BASH_ENV"
            echo 'export PATH="$BUN_INSTALL/bin:$PATH"' >> "$BASH_ENV"
      - run:
          name: Verify container tooling
          command: |
            test "$(bun --version)" = "1.3.0"
            docker version
            docker compose version
      - run:
          name: Run Docker and Compose certification
          command: bun run gate:container

workflows:
  verify:
    jobs:
      - release-gate
      - render-build-gate:
          filters:
            branches:
              only:
                - main
      - browser-gate:
          requires:
            - release-gate
          filters:
            branches:
              only:
                - main
      - cross-browser-gate:
          requires:
            - release-gate
          filters:
            branches:
              only:
                - main
      - container-gate:
          requires:
            - release-gate
            - render-build-gate
          filters:
            branches:
              only:
                - main
