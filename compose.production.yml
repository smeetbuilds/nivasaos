services:
  nivasaos:
    build: .
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env.production
    environment:
      NIVASA_DB_PATH: /app/data/nivasaos.sqlite
      NIVASA_UPLOAD_DIR: /app/storage/uploads
      NIVASA_BACKUP_DIR: /app/backups
    expose:
      - "3000"
    volumes:
      - nivasa_data:/app/data
      - nivasa_uploads:/app/storage/uploads
      - nivasa_backups:/app/backups
    healthcheck:
      test: ["CMD", "bun", "-e", "const r=await fetch('http://127.0.0.1:3000/api/health'); if(!r.ok) process.exit(1)"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      nivasaos:
        condition: service_healthy
    environment:
      NIVASA_DOMAIN: ${NIVASA_DOMAIN:?Set NIVASA_DOMAIN in .env.production}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  nivasa_data:
  nivasa_uploads:
  nivasa_backups:
  caddy_data:
  caddy_config:
