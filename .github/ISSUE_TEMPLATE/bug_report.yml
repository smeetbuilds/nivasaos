name: Bug report
description: Report a reproducible defect in NivasaOS
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include passwords, API keys, resident data, payment proofs, database files or private logs.
        Security vulnerabilities must be reported through the repository security policy instead of a public issue.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the observed behaviour and why it is incorrect.
      placeholder: Include the affected route, workflow and record state.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide the smallest deterministic sequence.
      placeholder: |
        1. Start from...
        2. Sign in as...
        3. Open...
        4. Submit...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version, commit SHA, installation method, Bun version, browser and operating system.
      placeholder: |
        NivasaOS:
        Commit:
        Docker or direct Bun:
        Bun:
        Browser:
        OS:
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification output
      description: Include relevant sanitized output from bun run gate or the failing verifier.
      render: shell
  - type: checkboxes
    id: scope
    attributes:
      label: Safety confirmation
      options:
        - label: I removed secrets, personal data, payment proofs and private tenant information.
          required: true
        - label: I searched existing issues for the same defect.
          required: true
